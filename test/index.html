<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>L'Atelier Fleurs &amp; Sens — Gestion — TEST V3.1.1 MODULAIRE</title>
<!-- Version TEST V3.1.1 MODULAIRE : bibliothèque de prestations réutilisables dans les paramètres -->
<!-- Version PROD V3.0.4 MODULAIRE : correctif double comptage À encaisser prochainement pour les ateliers liés à devis/factures -->
<!-- Version PROD V3.0.3 MODULAIRE : architecture V3 validée en production + journal des modifications -->
<!-- Version PROD V3.0.3 MODULAIRE : prestations complémentaires ateliers + devis/factures + ventilation URSSAF -->
<!-- Version PROD V2.0.40 : correctif menus déroulants moyens de paiement sur saisie facture/encaissement -->
<!-- Version PROD V2.0.39 : version harmonisée + trésorerie mensuelle sélection mois/année vérifiée -->
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="js/early-listeners.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<link rel="stylesheet" href="css/style.css">
<!-- V3 TEST : CSS et JS externalisés. La logique historique reste dans js/app.js pendant la modularisation progressive. -->
</head>
<body>
<div id="login" style="display:none;min-height:100vh;align-items:center;justify-content:center;padding:24px;">
  <div style="max-width:380px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px;">
    <div class="serif" style="font-size:22px;color:var(--bordeaux);font-weight:700;text-align:center;">L'Atelier Fleurs &amp; Sens</div>
    <p class="muted" style="text-align:center;margin:6px 0 18px;">Connexion à ton espace sécurisé</p>
    <label class="field"><span>Email</span><input id="loginEmail" type="email" autocomplete="username"></label>
    <label class="field"><span>Mot de passe</span><input id="loginPwd" type="password" autocomplete="current-password"></label>
    <label style="display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:12px;cursor:pointer;"><input type="checkbox" id="rememberMe" checked style="width:18px;height:18px;"> Se souvenir de moi sur cet appareil</label>
    <div id="loginErr" style="color:#9b3b3b;font-size:13px;margin-bottom:10px;display:none;"></div>
    <button class="btn primary" data-action="do-login" style="width:100%;">Se connecter</button>
    <p class="muted" style="font-size:11px;text-align:center;margin:12px 0 0;">Tes données sont chiffrées et privées, accessibles uniquement avec ce compte.</p>
  </div>
</div>

<div id="appwrap" style="display:none;">
<div class="topbar">
  <span id="cloudStatus">☁️ Connexion…</span>
  <span style="flex:1"></span>
  <button class="btn small ghost" data-action="cloud-backup" style="color:#fff;border-color:rgba(255,255,255,.4);">Sauvegarde fichier</button>
  <button class="btn small soft" data-action="do-logout">Se déconnecter</button>
</div>

<header class="app">
  <div class="brand">
    <img class="brand-logo" src="assets/logo.jpg" alt="L'Atelier Fleurs &amp; Sens">
    <div>
      <div class="title" id="entName">L'Atelier Fleurs &amp; Sens</div>
      <div class="sub">Gestion devis · factures · commandes · mariages</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="global-search">
      <input id="globalSearchInput" placeholder="Rechercher partout : devis, facture, client, stock…" autocomplete="off">
      <div id="globalSearchResults" class="global-results"></div>
    </div>
    <button class="btn gold" data-action="newdevis">+ Nouveau devis</button>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<main id="view"></main>
</div>

<input type="file" id="logoInput" accept="image/*" style="display:none" />
<input type="file" id="marMedia" accept="image/*,application/pdf,.pdf,.doc,.docx" style="display:none" />
<input type="file" id="encImport" accept=".csv,text/csv" style="display:none" />
<input type="file" id="restoreInput" accept=".json,application/json" style="display:none" />

<script src="js/app.js" defer></script>
</body>
</html>
